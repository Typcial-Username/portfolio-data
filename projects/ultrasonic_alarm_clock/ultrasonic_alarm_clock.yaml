id: ultrasonic_alarm_clock
title: Ultrasonic Alarm Clock
description: An alarm clock using ultrasonic transducers to produce directional sound to specifically wake specific people instead of the entire room.
course: SIP405
objectives:
  - code: DMF-2
    reason: Uses a ESP32 microcontroller and ultrasonic transducers to produce directional sound.
  - code: RES-3
    reason: Is powered by a M5Stack Core2 to handle SD Card reading for alarm files and keeping track of time. Includes a screen, micro SD card reader, gyroscope, accelerometer, and works with a ESP32 microcontroller for high-speed workloads utilizing dual cores.
repo: Typcial-Username/SIP
status: in-progress
visibility: public
