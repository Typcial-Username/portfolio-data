id: ultrasonic_alarm_clock
title: Ultrasonic Alarm Clock
description: An alarm clock using ultrasonic transducers to produce directional sound to specifically wake specific people instead of the entire room.
course: SIP405
media:
  docs:
    - schematic.pdf
objectives:
  - code: DMF-2
    reason: Integrates an embedded system and electronic components into a functional product by combining an ESP32-based controller with ultrasonic transducers to produce directional audio output. The project demonstrates the implementation of microcontroller-driven signal generation, user interface components, and audio control within a cohesive system. Multiple hardware elements, including storage, display, and sensors, are coordinated through software to achieve reliable operation and real-time responsiveness. This reflects the practical application of embedded systems in product design, where electronic components are not only included but actively integrated to deliver a unique and functional user experience.
  - code: RES-3
    reason: Is powered by an M5Stack Core2 to manage timekeeping, user interaction, and audio playback using an onboard ESP32 with dual-core processing for responsive performance. The system integrates multiple embedded components, including an SD card for alarm audio storage, a display for configuration, and onboard sensors such as a gyroscope and accelerometer for interaction and state awareness. It demonstrates embedded systems design through the coordination of hardware and software to produce directional audio using ultrasonic transducers, requiring precise signal control to focus sound toward a specific target. The project also balances real-time requirements such as accurate time tracking and immediate alarm response with higher-level functions like file handling and user input, reflecting practical considerations in task management and system efficiency. Overall, it represents a cohesive integration of multiple subsystems into a functional embedded solution, highlighting applied knowledge of electronics, signal control, and system-level design.
