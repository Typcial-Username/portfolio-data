objectives:
  - code: DMF-1
    reason: Demonstrates the use of physical prototyping tools and techniques through the construction of a functional marble run using cardboard as the primary material. The project involved translating a conceptual design into a physical structure using hands-on fabrication methods, including cutting, assembly, and iterative adjustments to improve performance. Working within the constraints of cardboard required adapting digital or conceptual ideas into practical build decisions that account for material limitations and structural behavior. This reflects the ability to use accessible materials and fabrication techniques to produce functional prototypes through iterative physical development.
  - code: DMF-5
    reason: Demonstrates proficiency with prototyping techniques and fabrication methods through the structural design and assembly of a cardboard marble run. Construction required the use of scoring techniques to create controlled bends, strategic adhesive application for joint strength, and reinforcement structures to maintain stability throughout the system. These methods were applied to guide marble movement through intentional pathway design while maintaining structural integrity across multiple segments. The project highlights practical understanding of how fabrication techniques directly influence performance, durability, and functionality in physical prototypes.
